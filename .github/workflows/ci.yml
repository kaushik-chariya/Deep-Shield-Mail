name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  project-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install dvc dvc-s3 dagshub

      - name: Setup PostgreSQL data
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "CREATE TABLE IF NOT EXISTS emails (
                     text   TEXT,
                     target INTEGER
                   );"
          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "\COPY emails FROM 'data/emails.csv' CSV HEADER;"

      - name: Run DVC pipeline
        env:
          DEEPSHIELD_TEST:       ${{ secrets.DEEPSHIELD_TEST }}
          POSTGRES_HOST:         localhost
          POSTGRES_PORT:         5432
          POSTGRES_DB:           ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:         ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: dvc repro

      - name: Run model tests
        if: success()
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
        run: |
          python -m pytest tests/test_model.py -v

      - name: Promote model to production
        if: success() && github.ref == 'refs/heads/master'
        env:
          DEEPSHIELD_TEST:       ${{ secrets.DEEPSHIELD_TEST }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME:       ${{ secrets.AWS_BUCKET_NAME }}
        run: python scripts/promote_model.py

      - name: Spam check Flask app
        if: success()
        env:
          DEEPSHIELD_TEST:   ${{ secrets.DEEPSHIELD_TEST }}
          FLASK_DEBUG:       "0"
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     5432
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          python serving/api/app.py > /tmp/app.log 2>&1 &
          APP_PID=$!

          echo "⏳ Waiting for Flask app to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "✅ Flask app is up (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Flask app did not start in 30 seconds"
              echo "──── app.log ────"
              cat /tmp/app.log
              kill $APP_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          curl --fail http://localhost:8000/health

          curl --fail -X POST http://localhost:8000/api/predict/manual \
            -H "Content-Type: application/json" \
            -d '{"raw": "Congratulations! You have won a free prize. Click here now."}' \
            | python -c "
          import sys, json
          r = json.load(sys.stdin)
          print('Prediction result:', r)
          assert 'prediction' in r, 'prediction key missing in response'
          print('✅ /api/predict/manual working correctly')
          "

          kill $APP_PID 2>/dev/null

      # ==================== AWS & EKS DEPLOYMENT ====================
      
      - name: Configure AWS credentials
        if: success() && github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        if: success() && github.ref == 'refs/heads/master'
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker image
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest .

      - name: Tag Docker image
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker image to ECR
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Set up kubectl
        if: success() && github.ref == 'refs/heads/master'
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Update kubeconfig for EKS
        if: success() && github.ref == 'refs/heads/master'
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name flask-final

      - name: Verify EKS cluster access
        if: success() && github.ref == 'refs/heads/master'
        run: |
          # Test cluster access
          kubectl cluster-info
          kubectl get nodes
          kubectl get namespaces

      - name: Create Kubernetes secret
        if: success() && github.ref == 'refs/heads/master'
        run: |
          kubectl create secret generic deepshield-secret \
            --from-literal=DEEPSHIELD_TEST=${{ secrets.DEEPSHIELD_TEST }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        if: success() && github.ref == 'refs/heads/master'
        run: |
          kubectl apply -f infra/kubernetes/deployment.yaml
          kubectl rollout status deployment/deep-shield-mail --timeout=120s

      - name: Verify deployment
        if: success() && github.ref == 'refs/heads/master'
        run: |
          echo "✅ Deployment completed successfully!"
          kubectl get pods -l app=deep-shield-mail
          kubectl get svc -l app=deep-shield-mail