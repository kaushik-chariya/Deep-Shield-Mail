name: CI/CD Pipeline - Deep Shield Mail

on:
  push:
    branches:
      - main

env:
  CLUSTER_NAME: flask-final

jobs:
  project-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      # =========================================
      # Checkout Repository
      # =========================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================
      # Setup Python
      # =========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================================
      # Install System Dependencies
      # =========================================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      # =========================================
      # Install Python Dependencies
      # =========================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # =========================================
      # Setup DVC
      # =========================================
      - name: Install DVC
        run: |
          pip install dvc[s3]

      # =========================================
      # Pull DVC Data
      # =========================================
      - name: Pull DVC Data
        run: |
          dvc pull || true

      # =========================================
      # Run Unit Tests
      # =========================================
      - name: Run Tests
        run: |
          pytest || true

      # =========================================
      # Configure AWS Credentials
      # =========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================================
      # Login to Amazon ECR
      # =========================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # =========================================
      # Build Docker Image
      # =========================================
      - name: Build Docker Image
        run: |
          docker build -t deepshield-mail .

      # =========================================
      # Tag Docker Image
      # =========================================
      - name: Tag Docker Image
        run: |
          docker tag deepshield-mail:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================================
      # Push Docker Image to ECR
      # =========================================
      - name: Push Docker Image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================================
      # Install kubectl
      # =========================================
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      # =========================================
      # Configure kubeconfig
      # =========================================
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name $CLUSTER_NAME

      # =========================================
      # Verify Cluster
      # =========================================
      - name: Verify EKS Cluster
        run: |
          kubectl get nodes

      # =========================================
      # Create Kubernetes Secrets
      # =========================================
      - name: Create Kubernetes Secret
        run: |

          kubectl delete secret deepshield-secret \
            --ignore-not-found

          kubectl create secret generic deepshield-secret \
            --from-literal=POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
            --from-literal=POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=DEEPSHIELD_TEST="${{ secrets.DEEPSHIELD_TEST }}"

      # =========================================
      # Deploy Application
      # =========================================
      - name: Deploy to EKS
        run: |

          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      # =========================================
      # Wait for Deployment
      # =========================================
      - name: Wait for Deployment
        run: |
          kubectl rollout status deployment/flask-app

      # =========================================
      # Verify Deployment
      # =========================================
      - name: Verify Deployment
        run: |

          echo "========== NODES =========="
          kubectl get nodes

          echo "========== PODS =========="
          kubectl get pods -o wide

          echo "========== SERVICES =========="
          kubectl get svc

          echo "========== DEPLOYMENTS =========="
          kubectl get deployments