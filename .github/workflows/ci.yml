name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev

  pull_request:
    branches:
      - master

jobs:
  project-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      # =========================================
      # Checkout Code
      # =========================================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================================
      # Setup Python
      # =========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================================
      # Cache pip dependencies
      # =========================================
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # =========================================
      # Install Dependencies
      # =========================================
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install dvc dvc-s3 dagshub

      # =========================================
      # Setup PostgreSQL Data
      # =========================================
      - name: Setup PostgreSQL data
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "CREATE TABLE IF NOT EXISTS emails (
                     text TEXT,
                     target INTEGER
                   );"

          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "\COPY emails FROM 'data/emails.csv' CSV HEADER;"

      # =========================================
      # Run DVC Pipeline
      # =========================================
      - name: Run DVC pipeline
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          dvc repro

      # =========================================
      # Run Model Tests
      # =========================================
      - name: Run model tests
        if: success()
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
        run: |
          python -m pytest tests/test_model.py -v

      # =========================================
      # Promote Model
      # =========================================
      - name: Promote model to production
        if: success() && github.ref == 'refs/heads/master'
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          python scripts/promote_model.py

      # =========================================
      # Flask App Testing
      # =========================================
      - name: Spam check Flask app
        if: success()
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
          FLASK_DEBUG: "0"
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          python serving/api/app.py > /tmp/app.log 2>&1 &
          APP_PID=$!

          echo "⏳ Waiting for Flask app..."

          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "✅ Flask app running"
              break
            fi

            if [ $i -eq 30 ]; then
              echo "❌ Flask app failed"
              cat /tmp/app.log
              kill $APP_PID 2>/dev/null
              exit 1
            fi

            sleep 1
          done

          curl --fail http://localhost:8000/health

          curl --fail -X POST \
            http://localhost:8000/api/predict/manual \
            -H "Content-Type: application/json" \
            -d '{"raw":"Congratulations! You won a free prize!"}' \
            | python -c "
          import sys, json
          r=json.load(sys.stdin)
          print(r)
          assert 'prediction' in r
          "

          kill $APP_PID 2>/dev/null

      # =========================================
      # Configure AWS Credentials
      # =========================================
      - name: Configure AWS credentials
        if: success() && github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # =========================================
      # Verify AWS Identity
      # =========================================
      - name: Verify AWS identity
        if: success() && github.ref == 'refs/heads/master'
        run: |
          aws sts get-caller-identity

      # =========================================
      # Login to Amazon ECR
      # =========================================
      - name: Login to AWS ECR
        if: success() && github.ref == 'refs/heads/master'
        run: |
          aws ecr get-login-password \
            --region ${{ secrets.AWS_REGION }} | \
            docker login \
            --username AWS \
            --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # =========================================
      # Build Docker Image
      # =========================================
      - name: Build Docker image
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker build \
            -t ${{ secrets.ECR_REPOSITORY }}:latest .

      # =========================================
      # Tag Docker Image
      # =========================================
      - name: Tag Docker image
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker tag \
            ${{ secrets.ECR_REPOSITORY }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================================
      # Push Docker Image to ECR
      # =========================================
      - name: Push Docker image to ECR
        if: success() && github.ref == 'refs/heads/master'
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

      # =========================================
      # Deploy to EC2 (24/7 with auto-restart)
      # =========================================
      - name: Deploy to EC2
        if: success() && github.ref == 'refs/heads/master'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # ── Login to ECR ──────────────────────────────
            aws ecr get-login-password \
              --region ${{ secrets.AWS_REGION }} | \
              docker login \
              --username AWS \
              --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            # ── Pull latest image from ECR ────────────────
            docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

            # ── Stop & remove old container if exists ─────
            docker stop deep-shield-mail || true
            docker rm   deep-shield-mail || true

            # ── Run new container (24/7 auto-restart) ─────
            docker run -d \
              --name deep-shield-mail \
              --restart=always \
              -p 8000:8000 \
              --memory="512m" \
              --cpus="1" \
              -e DEEPSHIELD_TEST="${{ secrets.DEEPSHIELD_TEST }}" \
              -e POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}" \
              -e POSTGRES_PORT="5432" \
              -e POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
              -e POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
              -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_KEY }}" \
              -e AWS_DEFAULT_REGION="${{ secrets.AWS_REGION }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e FLASK_SECRET_KEY="${{ secrets.FLASK_SECRET_KEY }}" \
              -e OAUTHLIB_INSECURE_TRANSPORT="1" \
              -e REDIRECT_URI="${{ secrets.REDIRECT_URI }}" \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

            # ── Wait for app to be healthy ────────────────
            echo "⏳ Waiting for Flask app to start..."

            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null; then
                echo "✅ Flask app is live and healthy!"
                break
              fi

              if [ $i -eq 30 ]; then
                echo "❌ Flask app did not start in time"
                docker logs deep-shield-mail
                exit 1
              fi

              sleep 2
            done

            # ── Show running container ────────────────────
            echo "🚀 Deployment successful! Container status:"
            docker ps | grep deep-shield-mail