name: CI Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master

jobs:
  project-testing:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ─────────────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────
      # 2. Python
      # ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ─────────────────────────────────────────────────────────
      # 3. Cache pip
      # ─────────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ─────────────────────────────────────────────────────────
      # 4. Install dependencies
      # ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install dvc dvc-s3 dagshub

      # ─────────────────────────────────────────────────────────
      # 5. Seed PostgreSQL
      # ─────────────────────────────────────────────────────────
      - name: Setup PostgreSQL data
        env:
          PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "CREATE TABLE IF NOT EXISTS emails (
                     text   TEXT,
                     target INTEGER
                   );"
          psql -h localhost \
               -U ${{ secrets.POSTGRES_USER }} \
               -d ${{ secrets.POSTGRES_DB }} \
               -c "\COPY emails FROM 'data/emails.csv' CSV HEADER;"

      # ─────────────────────────────────────────────────────────
      # 6. DVC pipeline
      # ─────────────────────────────────────────────────────────
      - name: Run DVC pipeline
        env:
          DEEPSHIELD_TEST:       ${{ secrets.DEEPSHIELD_TEST }}
          POSTGRES_HOST:         localhost
          POSTGRES_PORT:         5432
          POSTGRES_DB:           ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:         ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
        run: dvc repro

      # ─────────────────────────────────────────────────────────
      # 7. Model tests
      # ─────────────────────────────────────────────────────────
      - name: Run model tests
        if: success()
        env:
          DEEPSHIELD_TEST: ${{ secrets.DEEPSHIELD_TEST }}
        run: |
          python -m pytest tests/test_model.py -v

      # ─────────────────────────────────────────────────────────
      # 8. Promote model to production
      # FIX: सिर्फ master branch पर promote होगा
      # ─────────────────────────────────────────────────────────
      - name: Promote model to production
        if: success() && github.ref == 'refs/heads/master'
        env:
          DEEPSHIELD_TEST:       ${{ secrets.DEEPSHIELD_TEST }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME:       ${{ secrets.AWS_BUCKET_NAME }}
        run: python scripts/promote_model.py

      # ─────────────────────────────────────────────────────────
      # 9. Flask health check
      # FIX: /health route ab app.py mein exist karta hai.
      #      FLASK_DEBUG=0 → debug reloader band, watchdog nahi chalega.
      # ─────────────────────────────────────────────────────────
      - name: Spam check Flask app
        if: success()
        env:
          DEEPSHIELD_TEST:   ${{ secrets.DEEPSHIELD_TEST }}
          FLASK_DEBUG:       "0"
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     5432
          POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          python serving/api/app.py > /tmp/app.log 2>&1 &
          APP_PID=$!

          echo "⏳ Waiting for Flask app to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "✅ Flask app is up (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Flask app did not start in 30 seconds"
              echo "──── app.log ────"
              cat /tmp/app.log
              kill $APP_PID 2>/dev/null
              exit 1
            fi
            sleep 1
          done

          # /health check
          curl --fail http://localhost:8000/health

          # /api/predict/manual endpoint test
          curl --fail -X POST http://localhost:8000/api/predict/manual \
            -H "Content-Type: application/json" \
            -d '{"raw": "Congratulations! You have won a free prize. Click here now."}' \
            | python -c "
          import sys, json
          r = json.load(sys.stdin)
          print('Prediction result:', r)
          assert 'prediction' in r, 'prediction key missing in response'
          print('✅ /api/predict/manual working correctly')
          "

          kill $APP_PID 2>/dev/null