<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — Deep Shield Mail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f3ee;
  --bg2:      #eeece6;
  --surface:  #ffffff;
  --surface2: #f9f8f5;
  --ink:      #1c1b18;
  --ink2:     #4a4840;
  --ink3:     #9a9890;
  --rule:     rgba(28,27,24,0.09);
  --rule2:    rgba(28,27,24,0.05);
  --red:      #c0392b;
  --red-bg:   #fdf0ee;
  --red-bd:   rgba(192,57,43,0.2);
  --green:    #1e7e4a;
  --green-bg: #eef7f2;
  --green-bd: rgba(30,126,74,0.2);
  --amber:    #b8540a;
  --gold:     #c9a84c;
  --font:     'Instrument Sans', sans-serif;
  --display:  'Playfair Display', serif;
  --mono:     'JetBrains Mono', monospace;
  --sidebar:  280px;
  --detail:   340px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ── */
.shell { display: flex; height: 100vh; }

/* ══════════════════════════════
   SIDEBAR
══════════════════════════════ */
.sidebar {
  width: var(--sidebar);
  flex-shrink: 0;
  background: var(--ink);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* subtle dot-grid texture */
.sidebar::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
}

.sb-brand {
  padding: 1.5rem 1.4rem 1.2rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: relative;
}

.sb-brand-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.sb-icon {
  width: 34px; height: 34px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.sb-brand h1 {
  font-family: var(--display);
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.01em;
}

.sb-tagline {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding-left: 44px;
}

/* user block */
.sb-user {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sb-user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(201,168,76,0.18);
  border: 1px solid rgba(201,168,76,0.35);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 8px;
}

.sb-user-email {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: rgba(255,255,255,0.45);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 5px;
}

.sb-provider {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 9px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(201,168,76,0.12);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,0.22);
}

/* stats */
.sb-stats {
  padding: 1.1rem 1.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.sb-stat {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 0.65rem 0.75rem;
}

.sb-stat-val {
  font-family: var(--display);
  font-size: 1.35rem;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  margin-bottom: 3px;
}

.sb-stat-lbl {
  font-family: var(--mono);
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.3);
}

.sb-stat.s-spam .sb-stat-val { color: #e07060; }
.sb-stat.s-clean .sb-stat-val { color: #5dba8a; }
.sb-stat.s-pct .sb-stat-val { color: var(--gold); }

/* progress ring */
.sb-ring-wrap {
  padding: 1rem 1.4rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 14px;
}

.ring-svg { flex-shrink: 0; }
.ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 5; }
.ring-fill  {
  fill: none;
  stroke: #e07060;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 157;
  stroke-dashoffset: 157;
  transform: rotate(-90deg);
  transform-origin: 28px 28px;
  transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
}

.ring-meta { flex: 1; }
.ring-label {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}
.ring-pct {
  font-family: var(--display);
  font-size: 1.6rem;
  font-weight: 700;
  color: #e07060;
}

/* actions */
.sb-actions {
  padding: 1.1rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: auto;
}

.btn-scan {
  width: 100%;
  padding: 0.75rem;
  background: var(--gold);
  border: none;
  border-radius: 8px;
  color: #1c1b18;
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.btn-scan:hover { background: #d4b55a; transform: translateY(-1px); }
.btn-scan:active { transform: scale(0.98); }
.btn-scan:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.btn-logout {
  display: block;
  width: 100%;
  padding: 0.65rem;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: rgba(255,255,255,0.3);
  font-family: var(--mono);
  font-size: 0.68rem;
  text-align: center;
  text-decoration: none;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }

/* ══════════════════════════════
   MAIN PANEL
══════════════════════════════ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.main-top {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
}

.main-top-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.main-top-left h2 {
  font-family: var(--display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--ink);
}

.inbox-count {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--ink3);
  background: var(--bg2);
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid var(--rule);
}

.main-top-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-btn {
  padding: 5px 13px;
  border-radius: 5px;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink3);
  font-family: var(--mono);
  font-size: 0.65rem;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.filter-btn:hover, .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.btn-page {
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid var(--rule);
  background: var(--surface);
  color: var(--ink2);
  font-family: var(--mono);
  font-size: 0.68rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-page:hover { border-color: var(--ink); color: var(--ink); }
.btn-page:disabled { opacity: 0.3; cursor: not-allowed; }

/* email list */
.email-list {
  flex: 1;
  overflow-y: auto;
  background: var(--surface);
}

.email-list::-webkit-scrollbar { width: 4px; }
.email-list::-webkit-scrollbar-track { background: transparent; }
.email-list::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

/* state */
.state-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--ink3);
  font-family: var(--mono);
  font-size: 0.78rem;
}

.spinner {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 2px solid var(--rule);
  border-top-color: var(--gold);
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* email row */
.erow {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--rule2);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  animation: rowIn 0.25s ease both;
}

@keyframes rowIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.erow:nth-child(1)  { animation-delay: 0.02s; }
.erow:nth-child(2)  { animation-delay: 0.04s; }
.erow:nth-child(3)  { animation-delay: 0.06s; }
.erow:nth-child(4)  { animation-delay: 0.08s; }
.erow:nth-child(5)  { animation-delay: 0.10s; }
.erow:nth-child(6)  { animation-delay: 0.12s; }
.erow:nth-child(7)  { animation-delay: 0.14s; }
.erow:nth-child(8)  { animation-delay: 0.16s; }
.erow:nth-child(9)  { animation-delay: 0.18s; }
.erow:nth-child(10) { animation-delay: 0.20s; }

.erow:hover { background: var(--bg2); }
.erow.selected { background: #f8f5ee; }

.erow-bar {
  width: 3px;
  flex-shrink: 0;
  background: var(--rule);
  transition: background 0.3s;
}
.erow.is-spam  .erow-bar { background: var(--red); }
.erow.is-ham   .erow-bar { background: var(--green); }
.erow.scanning .erow-bar { animation: barpulse 0.7s ease-in-out infinite alternate; }
@keyframes barpulse {
  from { background: var(--rule); }
  to   { background: var(--gold); }
}

.erow-body {
  flex: 1;
  padding: 0.85rem 1.1rem;
  min-width: 0;
}

.erow-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.erow-from {
  font-size: 0.83rem;
  font-weight: 600;
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.erow-date {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--ink3);
  flex-shrink: 0;
}

.erow-subject {
  font-size: 0.79rem;
  color: var(--ink2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: 2px;
}

.erow-snippet {
  font-size: 0.72rem;
  color: var(--ink3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--mono);
}

.erow-badge-col {
  flex-shrink: 0;
  padding: 0 1rem;
  display: flex;
  align-items: center;
}

.badge {
  padding: 3px 9px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
}

.badge-spam    { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.badge-ham     { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.badge-pending { background: var(--bg2);      color: var(--ink3);  border: 1px solid var(--rule); }
.badge-scanning {
  background: rgba(201,168,76,0.1);
  color: var(--amber);
  border: 1px solid rgba(201,168,76,0.25);
  animation: barpulse2 0.9s ease-in-out infinite alternate;
}
@keyframes barpulse2 { from { opacity: 0.5; } to { opacity: 1; } }

/* ══════════════════════════════
   DETAIL PANEL
══════════════════════════════ */
.detail {
  width: var(--detail);
  flex-shrink: 0;
  border-left: 1px solid var(--rule);
  background: var(--surface2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s cubic-bezier(.4,0,.2,1), opacity 0.3s;
}

.detail.hidden {
  width: 0;
  opacity: 0;
  pointer-events: none;
  border-left: none;
}

.detail-hdr {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.detail-hdr-title {
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--ink);
}

.btn-close {
  width: 26px; height: 26px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 5px;
  color: var(--ink3);
  font-size: 0.75rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-close:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}

.detail-body::-webkit-scrollbar { width: 3px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--rule); }

/* result hero */
.result-hero {
  border-radius: 10px;
  padding: 1.25rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.result-hero.spam {
  background: var(--red-bg);
  border: 1px solid var(--red-bd);
}
.result-hero.ham {
  background: var(--green-bg);
  border: 1px solid var(--green-bd);
}

.hero-icon { font-size: 2.2rem; margin-bottom: 6px; }

.hero-verdict {
  font-family: var(--display);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 3px;
}
.hero-verdict.spam { color: var(--red); }
.hero-verdict.ham  { color: var(--green); }

.hero-conf {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--ink3);
}

/* prob bar */
.prob-wrap { }
.prob-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}
.prob-lbl {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.prob-val {
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--ink2);
}
.prob-track {
  height: 5px;
  background: var(--rule);
  border-radius: 3px;
  overflow: hidden;
}
.prob-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s cubic-bezier(.4,0,.2,1);
}
.prob-fill.spam { background: var(--red); }
.prob-fill.ham  { background: var(--green); }

/* meta fields */
.meta-block {
  border: 1px solid var(--rule);
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
}
.meta-row {
  display: flex;
  gap: 8px;
  padding: 0.65rem 0.85rem;
  border-bottom: 1px solid var(--rule2);
}
.meta-row:last-child { border-bottom: none; }
.meta-key {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink3);
  width: 60px;
  flex-shrink: 0;
  padding-top: 1px;
}
.meta-val {
  font-size: 0.78rem;
  color: var(--ink2);
  word-break: break-word;
  line-height: 1.45;
}

/* snippet */
.snippet-block {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 0.85rem;
}
.snippet-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink3);
  margin-bottom: 6px;
}
.snippet-text {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--ink2);
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-row">
        <div class="sb-icon">🛡</div>
        <h1>Deep Shield</h1>
      </div>
      <div class="sb-tagline">Mail Protection</div>
    </div>

    <div class="sb-user">
      <div class="sb-user-avatar" id="sb-avatar">—</div>
      <div class="sb-user-email" id="sb-email">{{ user_email }}</div>
      <span class="sb-provider">⬡ {{ provider }}</span>
    </div>

    <div class="sb-stats">
      <div class="sb-stat">
        <div class="sb-stat-val" id="s-total">—</div>
        <div class="sb-stat-lbl">Total</div>
      </div>
      <div class="sb-stat s-spam">
        <div class="sb-stat-val" id="s-spam">—</div>
        <div class="sb-stat-lbl">Spam</div>
      </div>
      <div class="sb-stat s-clean">
        <div class="sb-stat-val" id="s-clean">—</div>
        <div class="sb-stat-lbl">Clean</div>
      </div>
      <div class="sb-stat s-pct">
        <div class="sb-stat-val" id="s-pct">—</div>
        <div class="sb-stat-lbl">Spam %</div>
      </div>
    </div>

    <div class="sb-ring-wrap">
      <svg class="ring-svg" width="56" height="56" viewBox="0 0 56 56">
        <circle class="ring-track" cx="28" cy="28" r="25"/>
        <circle class="ring-fill"  cx="28" cy="28" r="25" id="ring-fill"/>
      </svg>
      <div class="ring-meta">
        <div class="ring-label">Spam rate</div>
        <div class="ring-pct" id="ring-pct">0%</div>
      </div>
    </div>

    <div class="sb-actions">
      <button class="btn-scan" id="btn-scan" onclick="scanAll()">
        <span id="scan-ico">⚡</span>
        <span id="scan-txt">Scan Inbox</span>
      </button>
      <a href="/logout" class="btn-logout">↩ Disconnect</a>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">
    <div class="main-top">
      <div class="main-top-left">
        <h2>Inbox</h2>
        <span class="inbox-count" id="inbox-count">—</span>
      </div>
      <div class="main-top-right">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('spam',this)">Spam</button>
        <button class="filter-btn" onclick="setFilter('clean',this)">Clean</button>
        <button class="btn-page" id="btn-prev" onclick="loadPage(currentPage-1)" disabled>← Prev</button>
        <button class="btn-page" id="btn-next" onclick="loadPage(currentPage+1)">Next →</button>
      </div>
    </div>

    <div class="email-list" id="email-list">
      <div class="state-msg">
        <div class="spinner"></div>
        <span>Fetching inbox…</span>
      </div>
    </div>
  </main>

  <!-- ══ DETAIL ══ -->
  <aside class="detail hidden" id="detail">
    <div class="detail-hdr">
      <span class="detail-hdr-title">Analysis</span>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </aside>

</div>

<script>
let currentPage  = 1;
let allEmails    = [];
let currentFilter = 'all';

/* ── Avatar initials ── */
(function(){
  const em = document.getElementById('sb-email').textContent.trim();
  const av = document.getElementById('sb-avatar');
  av.textContent = em ? em[0].toUpperCase() : '?';
})();

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => loadPage(1));

/* ── Load page ── */
async function loadPage(page) {
  if (page < 1) return;
  currentPage = page;
  document.getElementById('btn-prev').disabled = page === 1;
  document.getElementById('email-list').innerHTML =
    `<div class="state-msg"><div class="spinner"></div><span>Loading page ${page}…</span></div>`;

  try {
    const res  = await fetch(`/api/emails?page=${page}&limit=25`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allEmails = data.emails || [];
    renderList();
    updateStats();
  } catch(e) {
    document.getElementById('email-list').innerHTML =
      `<div class="state-msg">⚠ ${esc(e.message)}</div>`;
  }
}

/* ── Render ── */
function renderList() {
  const list = currentFilter === 'all'  ? allEmails :
               currentFilter === 'spam' ? allEmails.filter(e => e.prediction === 1) :
                                          allEmails.filter(e => e.prediction === 0);

  document.getElementById('inbox-count').textContent = list.length + ' emails';

  if (!list.length) {
    document.getElementById('email-list').innerHTML =
      `<div class="state-msg">📭 No emails found.</div>`;
    return;
  }

  document.getElementById('email-list').innerHTML = list.map((em, i) => {
    const idx = allEmails.indexOf(em);
    const cls = em.prediction === 1 ? 'is-spam' : em.prediction === 0 ? 'is-ham' : '';
    const badgeCls = em.prediction === 1 ? 'badge-spam' :
                     em.prediction === 0 ? 'badge-ham'  : 'badge-pending';
    const badgeTxt = em.prediction === 1 ? 'Spam' :
                     em.prediction === 0 ? 'Clean' : '—';
    return `
      <div class="erow ${cls}" id="row-${idx}" onclick="selectEmail(${idx})" style="animation-delay:${i*0.025}s">
        <div class="erow-bar"></div>
        <div class="erow-body">
          <div class="erow-top">
            <div class="erow-from">${esc(em.from || 'Unknown')}</div>
            <div class="erow-date">${fmtDate(em.date)}</div>
          </div>
          <div class="erow-subject">${esc(em.subject || '(no subject)')}</div>
          <div class="erow-snippet">${esc((em.snippet||'').slice(0,100))}</div>
        </div>
        <div class="erow-badge-col">
          <span class="badge ${badgeCls}" id="badge-${idx}">${badgeTxt}</span>
        </div>
      </div>`;
  }).join('');
}

/* ── Filter ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

/* ── Select & predict ── */
async function selectEmail(idx) {
  document.querySelectorAll('.erow').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById(`row-${idx}`);
  if (row) row.classList.add('selected');

  const em = allEmails[idx];
  if (em.prediction !== undefined) { showDetail(em); return; }

  setBadge(idx, 'badge-scanning', '…');
  if (row) row.classList.add('scanning');

  try {
    const res  = await fetch('/api/predict', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ raw: em.raw }),
    });
    const pred = await res.json();
    if (pred.error) throw new Error(pred.error);
    Object.assign(allEmails[idx], pred);
    applyResult(idx, pred);
    showDetail(allEmails[idx]);
  } catch(e) {
    setBadge(idx, 'badge-pending', '?');
    if (row) row.classList.remove('scanning');
  }
}

/* ── Scan all ── */
async function scanAll() {
  const btn = document.getElementById('btn-scan');
  const ico = document.getElementById('scan-ico');
  const txt = document.getElementById('scan-txt');
  btn.disabled = true;
  ico.textContent = '⏳'; txt.textContent = 'Scanning…';

  try {
    const res  = await fetch('/api/scan', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ emails: allEmails }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    data.results.forEach((r, i) => {
      Object.assign(allEmails[i], r);
      applyResult(i, r);
    });
    updateStats(data);
    renderList();
  } catch(e) {
    alert('Scan failed: ' + e.message);
  } finally {
    btn.disabled = false;
    ico.textContent = '⚡'; txt.textContent = 'Scan Inbox';
  }
}

/* ── Apply result to row ── */
function applyResult(idx, pred) {
  const row = document.getElementById(`row-${idx}`);
  if (!row) return;
  row.classList.remove('scanning', 'is-spam', 'is-ham');
  if (pred.prediction === 1) {
    row.classList.add('is-spam');
    setBadge(idx, 'badge-spam', 'Spam');
  } else if (pred.prediction === 0) {
    row.classList.add('is-ham');
    setBadge(idx, 'badge-ham', 'Clean');
  }
}

function setBadge(idx, cls, txt) {
  const b = document.getElementById(`badge-${idx}`);
  if (!b) return;
  b.className = `badge ${cls}`;
  b.textContent = txt;
}

/* ── Detail ── */
function showDetail(em) {
  const panel = document.getElementById('detail');
  const body  = document.getElementById('detail-body');
  panel.classList.remove('hidden');

  const isSpam = em.prediction === 1;
  const cls    = isSpam ? 'spam' : 'ham';
  const prob   = ((em.probability || 0) * 100).toFixed(1);

  body.innerHTML = `
    <div class="result-hero ${cls}">
      <div class="hero-icon">${isSpam ? '🚫' : '✅'}</div>
      <div class="hero-verdict ${cls}">${em.label || (isSpam ? 'Spam Detected' : 'Looks Legitimate')}</div>
      <div class="hero-conf">Confidence: ${prob}%</div>
    </div>

    <div class="prob-wrap">
      <div class="prob-labels">
        <span class="prob-lbl">Spam probability</span>
        <span class="prob-val">${prob}%</span>
      </div>
      <div class="prob-track">
        <div class="prob-fill ${cls}" style="width:${prob}%"></div>
      </div>
    </div>

    <div class="meta-block">
      <div class="meta-row">
        <div class="meta-key">From</div>
        <div class="meta-val">${esc(em.from || '—')}</div>
      </div>
      <div class="meta-row">
        <div class="meta-key">Subject</div>
        <div class="meta-val">${esc(em.subject || '—')}</div>
      </div>
      <div class="meta-row">
        <div class="meta-key">Date</div>
        <div class="meta-val">${esc(em.date || '—')}</div>
      </div>
    </div>

    <div class="snippet-block">
      <div class="snippet-label">Preview</div>
      <div class="snippet-text">${esc((em.snippet||'').slice(0,350))}</div>
    </div>
  `;
}

function closeDetail() {
  document.getElementById('detail').classList.add('hidden');
  document.querySelectorAll('.erow').forEach(r => r.classList.remove('selected'));
}

/* ── Stats ── */
function updateStats(data) {
  const total = allEmails.length;
  const spam  = data ? data.spam_count : allEmails.filter(e => e.prediction === 1).length;
  const ham   = data ? data.ham_count  : allEmails.filter(e => e.prediction === 0).length;
  const pct   = total ? Math.round((spam / total) * 100) : 0;

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-spam').textContent  = spam;
  document.getElementById('s-clean').textContent = ham;
  document.getElementById('s-pct').textContent   = pct + '%';
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('inbox-count').textContent = total + ' emails';

  /* ring */
  const circumference = 2 * Math.PI * 25; /* r=25 */
  const offset = circumference * (1 - pct / 100);
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}

/* ── Helpers ── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  try {
    return new Date(d).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  } catch { return String(d).slice(0,10); }
}
</script>
</body>
</html>
