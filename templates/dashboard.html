<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox — Deep Shield Mail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4AF37;--gold-bright:#FFD700;--gold-dim:#8B7316;
  --gold-bg:rgba(212,175,55,0.08);--gold-border:rgba(212,175,55,0.18);--gold-glow:rgba(212,175,55,0.28);
  --bg-void:#03030A;--bg-deep:#060612;--bg-card:rgba(8,12,30,0.88);--bg-card2:rgba(6,6,18,0.96);
  --navy:#080C1E;--navy2:#0D1530;
  --green:#00E87A;--green-bg:rgba(0,232,122,0.07);--green-border:rgba(0,232,122,0.22);
  --red:#E74C3C;--red-bg:rgba(231,76,60,0.07);--red-border:rgba(231,76,60,0.22);
  --blue:#2E86C1;--orange:#FF6B35;--purple:#9B59B6;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --border-dim:rgba(255,255,255,0.06);
  --text-primary:#F0EDD6;--text-muted:#8A8A9A;--text-dim:#4A4A5A;
  --sidebar:268px;--detail:308px;
  --mono:'Space Mono',monospace;--display:'Orbitron',monospace;--font:'Rajdhani',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font);cursor:none}

/* CURSOR */
#cursor{position:fixed;width:8px;height:8px;background:var(--gold-bright);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s}
#cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(212,175,55,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .08s ease}

/* CANVAS + GRID */
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.grid-bg{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(212,175,55,0.022) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(212,175,55,0.022) 1px,transparent 1px);
  background-size:60px 60px;
}

/* SHELL */
.shell{display:flex;height:100vh;position:relative;z-index:2}

/* ═══════════════════════════ SIDEBAR ═══════════════════════════ */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg-card2);
  border-right:1px solid var(--gold-border);
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(212,175,55,0.035) 1px,transparent 1px);
  background-size:22px 22px;
}
.sidebar::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.55),transparent);
}

/* Brand */
.sb-brand{padding:1.3rem 1.2rem 1rem;border-bottom:1px solid var(--border-dim);position:relative;z-index:1}
.sb-brand-row{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.sb-icon{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:var(--gold-bg);border:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  box-shadow:0 0 14px var(--gold-glow);
}
.sb-brand-name{
  font-family:var(--display);font-size:.88rem;font-weight:700;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold),#6B5010);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;
}
.sb-tagline{
  font-family:var(--mono);font-size:.52rem;letter-spacing:.2em;
  color:var(--text-dim);text-transform:uppercase;padding-left:46px;
}

/* User */
.sb-user{padding:.85rem 1.2rem;border-bottom:1px solid var(--border-dim);position:relative;z-index:1}
.sb-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--gold-bg);border:1px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:.75rem;font-weight:700;color:var(--gold);
  margin-bottom:7px;box-shadow:0 0 10px var(--gold-glow);
}
.sb-email{
  font-family:var(--mono);font-size:.6rem;color:var(--text-muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:5px;
}
.sb-provider{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:4px;
  font-family:var(--mono);font-size:.52rem;
  text-transform:uppercase;letter-spacing:.12em;
  background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border);
}

/* Stats */
.sb-stats{
  padding:.85rem 1.2rem;border-bottom:1px solid var(--border-dim);
  display:grid;grid-template-columns:1fr 1fr;gap:7px;position:relative;z-index:1;
}
.sb-stat{
  background:var(--glass);border:1px solid var(--border-dim);border-radius:10px;
  padding:.6rem .7rem;transition:border-color .2s;
}
.sb-stat:hover{border-color:var(--gold-border)}
.sb-stat-val{
  font-family:var(--display);font-size:1.2rem;font-weight:700;
  color:var(--text-primary);line-height:1;margin-bottom:3px;
}
.sb-stat-lbl{font-family:var(--mono);font-size:.5rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)}
.s-spam  .sb-stat-val{color:var(--red)}
.s-clean .sb-stat-val{color:var(--green)}
.s-pct   .sb-stat-val{color:var(--gold)}

/* Ring */
.sb-ring-wrap{
  padding:.85rem 1.2rem;border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;gap:14px;position:relative;z-index:1;
}
.ring-track{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4.5}
.ring-fill{
  fill:none;stroke:var(--red);stroke-width:4.5;stroke-linecap:round;
  stroke-dasharray:157;stroke-dashoffset:157;
  transform:rotate(-90deg);transform-origin:28px 28px;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.ring-label{font-family:var(--mono);font-size:.55rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:3px}
.ring-pct{font-family:var(--display);font-size:1.45rem;font-weight:700;color:var(--red)}

/* Scan btn */
.sb-actions{padding:1rem 1.2rem;display:flex;flex-direction:column;gap:8px;margin-top:auto;position:relative;z-index:1}
.btn-scan{
  width:100%;padding:.8rem;
  background:linear-gradient(135deg,rgba(212,175,55,0.16),rgba(212,175,55,0.06));
  border:1px solid rgba(212,175,55,0.42);border-radius:11px;
  color:var(--text-primary);font-family:var(--display);font-size:.7rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:all .25s;display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;box-shadow:0 0 22px rgba(212,175,55,0.07);
}
.btn-scan::before{
  content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  transition:left .45s;
}
.btn-scan:hover::before{left:160%}
.btn-scan:hover{
  border-color:rgba(212,175,55,0.72);
  background:linear-gradient(135deg,rgba(212,175,55,0.26),rgba(212,175,55,0.12));
  transform:translateY(-1px);box-shadow:0 6px 26px rgba(212,175,55,0.18);
}
.btn-scan:active{transform:scale(.98)}
.btn-scan:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-logout{
  display:block;width:100%;padding:.62rem;
  background:transparent;border:1px solid var(--border-dim);border-radius:10px;
  color:var(--text-dim);font-family:var(--mono);font-size:.58rem;
  text-align:center;text-decoration:none;letter-spacing:.08em;cursor:pointer;
  transition:all .2s;text-transform:uppercase;
}
.btn-logout:hover{border-color:rgba(212,175,55,0.28);color:var(--text-muted)}

/* ═══════════════════════════ MAIN ═══════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg-deep)}

.main-top{
  padding:.8rem 1.3rem;border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,6,18,0.92);backdrop-filter:blur(20px);flex-shrink:0;
  position:relative;
}
.main-top::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-border),transparent);
}
.main-top-title{font-family:var(--display);font-size:.88rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-primary)}
.inbox-count{
  font-family:var(--mono);font-size:.56rem;color:var(--text-dim);
  background:var(--glass);padding:2px 9px;border-radius:20px;border:1px solid var(--border-dim);
  margin-left:10px;
}
.main-top-right{display:flex;align-items:center;gap:6px}
.filter-btn{
  padding:4px 11px;border-radius:5px;border:1px solid var(--border-dim);
  background:transparent;color:var(--text-dim);
  font-family:var(--mono);font-size:.56rem;cursor:pointer;
  transition:all .15s;text-transform:uppercase;letter-spacing:.08em;
}
.filter-btn:hover{border-color:var(--gold-border);color:var(--text-muted)}
.filter-btn.active{background:var(--gold-bg);border-color:var(--gold-border);color:var(--gold)}
.btn-page{
  padding:4px 11px;border-radius:5px;border:1px solid var(--border-dim);
  background:transparent;color:var(--text-dim);font-family:var(--mono);font-size:.58rem;
  cursor:pointer;transition:all .15s;
}
.btn-page:hover{border-color:var(--gold-border);color:var(--text-muted)}
.btn-page:disabled{opacity:.22;cursor:not-allowed}

/* Email list */
.email-list{flex:1;overflow-y:auto}
.email-list::-webkit-scrollbar{width:3px}
.email-list::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.18);border-radius:2px}

.state-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--text-dim);font-family:var(--mono);font-size:.72rem;letter-spacing:.08em;
}
.spinner{
  width:28px;height:28px;border-radius:50%;
  border:2px solid var(--border-dim);border-top-color:var(--gold);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Email row */
.erow{
  display:flex;align-items:stretch;
  border-bottom:1px solid rgba(255,255,255,0.025);
  cursor:pointer;transition:background .12s;position:relative;
  animation:rowIn .3s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.erow:hover{background:rgba(212,175,55,0.025)}
.erow.selected{background:rgba(212,175,55,0.045)}

/* accent bar */
.erow-bar{width:3px;flex-shrink:0;background:rgba(255,255,255,0.04);transition:background .3s}
.erow.is-spam .erow-bar{background:var(--red)}
.erow.is-ham  .erow-bar{background:var(--green)}
.erow.scanning .erow-bar{animation:barpulse .65s ease-in-out infinite alternate}
@keyframes barpulse{from{background:var(--border-dim)}to{background:var(--gold)}}

.erow-body{flex:1;padding:.75rem 1rem;min-width:0}
.erow-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.erow-from{font-family:var(--font);font-size:.82rem;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.erow-date{font-family:var(--mono);font-size:.57rem;color:var(--text-dim);flex-shrink:0}
.erow-subject{font-size:.75rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.erow-snippet{font-family:var(--mono);font-size:.62rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.erow-badge-col{flex-shrink:0;padding:0 .85rem;display:flex;align-items:center}
.badge{
  padding:2px 8px;border-radius:4px;
  font-family:var(--mono);font-size:.54rem;
  text-transform:uppercase;letter-spacing:.08em;font-weight:600;border:1px solid;
}
.badge-spam{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.badge-ham{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge-pending{background:var(--glass);color:var(--text-dim);border-color:var(--border-dim)}
.badge-scanning{
  background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border);
  animation:blink .9s ease-in-out infinite alternate;
}
@keyframes blink{from{opacity:.4}to{opacity:1}}

/* ═══════════════════════════ DETAIL PANEL ═══════════════════════════ */
.detail{
  width:var(--detail);flex-shrink:0;
  border-left:1px solid var(--gold-border);
  background:var(--bg-card2);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1),opacity .25s;
  position:relative;
}
.detail::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(212,175,55,0.03) 1px,transparent 1px);
  background-size:20px 20px;
}
.detail::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.5),transparent);
}
.detail.hidden{width:0;opacity:0;pointer-events:none;border-left:none}

.detail-hdr{
  padding:.85rem 1.1rem;border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  position:relative;z-index:1;
}
.detail-hdr-title{font-family:var(--display);font-size:.78rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn-close{
  width:26px;height:26px;background:var(--glass);border:1px solid var(--border-dim);
  border-radius:6px;color:var(--text-dim);font-size:.72rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.btn-close:hover{background:var(--glass2);color:var(--text-primary);border-color:var(--gold-border)}

.detail-body{flex:1;overflow-y:auto;padding:1.1rem;display:flex;flex-direction:column;gap:.95rem;position:relative;z-index:1}
.detail-body::-webkit-scrollbar{width:3px}
.detail-body::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.18);border-radius:2px}

/* Result hero */
.result-hero{
  border-radius:14px;padding:1.2rem;text-align:center;
  position:relative;overflow:hidden;border:1px solid;
}
.result-hero::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.35;
}
.result-hero.spam{background:var(--red-bg);border-color:var(--red-border)}
.result-hero.ham{background:var(--green-bg);border-color:var(--green-border)}
.hero-icon{font-size:2rem;margin-bottom:6px;display:block}
.hero-verdict{font-family:var(--display);font-size:1rem;font-weight:700;letter-spacing:2px;margin-bottom:4px}
.hero-verdict.spam{color:var(--red)}
.hero-verdict.ham{color:var(--green)}
.hero-conf{font-family:var(--mono);font-size:.58rem;color:var(--text-muted)}

/* Prob bar */
.prob-labels{display:flex;justify-content:space-between;margin-bottom:6px}
.prob-lbl{font-family:var(--mono);font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)}
.prob-val{font-family:var(--display);font-size:.65rem;font-weight:700;color:var(--text-muted)}
.prob-track{height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.prob-fill.spam{background:linear-gradient(90deg,rgba(231,76,60,.45),var(--red))}
.prob-fill.ham{background:linear-gradient(90deg,rgba(0,232,122,.45),var(--green))}

/* Meta block */
.meta-block{border:1px solid var(--border-dim);border-radius:11px;overflow:hidden;background:var(--glass)}
.meta-row{display:flex;gap:8px;padding:.58rem .82rem;border-bottom:1px solid rgba(255,255,255,0.025)}
.meta-row:last-child{border-bottom:none}
.meta-key{font-family:var(--mono);font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);width:55px;flex-shrink:0;padding-top:1px}
.meta-val{font-size:.76rem;color:var(--text-muted);word-break:break-word;line-height:1.45;font-family:var(--font)}

/* Snippet */
.snippet-block{background:var(--glass);border:1px solid var(--border-dim);border-radius:11px;padding:.82rem}
.snippet-label{font-family:var(--mono);font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:7px}
.snippet-text{font-family:var(--mono);font-size:.65rem;color:var(--text-muted);line-height:1.7}

/* Feature rows in detail */
.feature-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.5rem .82rem;font-size:.76rem;
}
.feature-row span:first-child{color:var(--text-muted);font-family:var(--font)}
.f-det{font-family:var(--mono);font-size:.57rem;letter-spacing:.05em}
.f-red{color:var(--red)}.f-gold{color:var(--gold)}.f-green{color:var(--green)}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="particle-canvas"></canvas>
<div class="grid-bg"></div>

<div class="shell">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-brand-row">
        <div class="sb-icon">🛡</div>
        <div class="sb-brand-name">DEEP SHIELD</div>
      </div>
      <div class="sb-tagline">Mail Protection · AI</div>
    </div>

    <div class="sb-user">
      <div class="sb-avatar" id="sb-avatar">—</div>
      <div class="sb-email" id="sb-email">{{ user_email }}</div>
      <span class="sb-provider">⬡ {{ provider }}</span>
    </div>

    <div class="sb-stats">
      <div class="sb-stat">
        <div class="sb-stat-val" id="s-total">—</div>
        <div class="sb-stat-lbl">Total</div>
      </div>
      <div class="sb-stat s-spam">
        <div class="sb-stat-val" id="s-spam">—</div>
        <div class="sb-stat-lbl">Spam</div>
      </div>
      <div class="sb-stat s-clean">
        <div class="sb-stat-val" id="s-clean">—</div>
        <div class="sb-stat-lbl">Clean</div>
      </div>
      <div class="sb-stat s-pct">
        <div class="sb-stat-val" id="s-pct">—</div>
        <div class="sb-stat-lbl">Spam %</div>
      </div>
    </div>

    <div class="sb-ring-wrap">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="ring-track" cx="28" cy="28" r="25"/>
        <circle class="ring-fill"  cx="28" cy="28" r="25" id="ring-fill"/>
      </svg>
      <div>
        <div class="ring-label">Spam Rate</div>
        <div class="ring-pct" id="ring-pct">0%</div>
      </div>
    </div>

    <div class="sb-actions">
      <button class="btn-scan" id="btn-scan" onclick="scanAll()">
        <span id="scan-ico">⚡</span>
        <span id="scan-txt">SCAN INBOX</span>
      </button>
      <a href="/logout" class="btn-logout">↩ DISCONNECT</a>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">
    <div class="main-top">
      <div style="display:flex;align-items:center">
        <div class="main-top-title">INBOX</div>
        <span class="inbox-count" id="inbox-count">—</span>
      </div>
      <div class="main-top-right">
        <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('spam',this)">SPAM</button>
        <button class="filter-btn" onclick="setFilter('clean',this)">CLEAN</button>
        <button class="btn-page" id="btn-prev" onclick="loadPage(currentPage-1)" disabled>← PREV</button>
        <button class="btn-page" id="btn-next" onclick="loadPage(currentPage+1)">NEXT →</button>
      </div>
    </div>

    <div class="email-list" id="email-list">
      <div class="state-msg">
        <div class="spinner"></div>
        <span>FETCHING INBOX…</span>
      </div>
    </div>
  </main>

  <!-- ══ DETAIL ══ -->
  <aside class="detail hidden" id="detail">
    <div class="detail-hdr">
      <span class="detail-hdr-title">ANALYSIS</span>
      <button class="btn-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </aside>

</div>

<script>
/* ── CURSOR ── */
var cur=document.getElementById('cursor'),ring=document.getElementById('cursor-ring');
var mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function anim(){rx+=(mx-rx)*.11;ry+=(my-ry)*.11;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
document.querySelectorAll('a,button').forEach(function(el){
  el.addEventListener('mouseenter',function(){cur.style.width='14px';cur.style.height='14px';ring.style.width='44px';ring.style.height='44px'});
  el.addEventListener('mouseleave',function(){cur.style.width='8px';cur.style.height='8px';ring.style.width='32px';ring.style.height='32px'});
});

/* ── PARTICLES ── */
var canvas=document.getElementById('particle-canvas');
var ctx=canvas.getContext('2d');
var W,H,parts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);
function Particle(){this.reset()}
Particle.prototype.reset=function(){
  this.x=Math.random()*W;this.y=Math.random()*H;
  this.size=Math.random()*1.5+.3;
  this.vx=(Math.random()-.5)*.22;this.vy=(Math.random()-.5)*.22;
  this.life=Math.random()*200+80;this.maxLife=this.life;
  var r=Math.random();this.type=r<.55?'gold':r<.8?'blue':'white';
};
Particle.prototype.update=function(){
  this.x+=this.vx;this.y+=this.vy;this.life--;
  if(this.life<=0||this.x<-10||this.x>W+10||this.y<-10||this.y>H+10)this.reset();
};
Particle.prototype.draw=function(){
  var a=(this.life/this.maxLife)*.55;
  var c=this.type==='gold'?'rgba(212,175,55,'+a+')':this.type==='blue'?'rgba(46,134,193,'+(a*.45)+')':'rgba(255,255,255,'+(a*.2)+')';
  ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
};
for(var i=0;i<120;i++)parts.push(new Particle());
var mgx=W/2,mgy=H/2,mgActive=false;
document.addEventListener('mousemove',function(e){mgx=e.clientX;mgy=e.clientY;mgActive=true});
(function loop(){
  ctx.clearRect(0,0,W,H);
  if(mgActive){var g=ctx.createRadialGradient(mgx,mgy,0,mgx,mgy,180);g.addColorStop(0,'rgba(212,175,55,.03)');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}
  for(var i=0;i<parts.length;i++){
    parts[i].update();parts[i].draw();
    for(var j=i+1;j<parts.length;j++){
      var dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<70){ctx.beginPath();ctx.moveTo(parts[i].x,parts[i].y);ctx.lineTo(parts[j].x,parts[j].y);ctx.strokeStyle='rgba(212,175,55,'+(0.05*(1-d/70))+')';ctx.lineWidth=.35;ctx.stroke()}
    }
  }
  requestAnimationFrame(loop);
})();

/* ── APP STATE ── */
var currentPage=1,allEmails=[],currentFilter='all';

/* avatar */
(function(){
  var em=document.getElementById('sb-email').textContent.trim();
  document.getElementById('sb-avatar').textContent=em?em[0].toUpperCase():'?';
})();

document.addEventListener('DOMContentLoaded',function(){loadPage(1)});

async function loadPage(page){
  if(page<1)return;
  currentPage=page;
  document.getElementById('btn-prev').disabled=page===1;
  document.getElementById('email-list').innerHTML='<div class="state-msg"><div class="spinner"></div><span>LOADING PAGE '+page+'…</span></div>';
  try{
    var res=await fetch('/api/emails?page='+page+'&limit=25');
    var data=await res.json();
    if(data.error)throw new Error(data.error);
    allEmails=data.emails||[];
    renderList();updateStats();
  }catch(e){
    document.getElementById('email-list').innerHTML='<div class="state-msg">⚠ '+esc(e.message)+'</div>';
  }
}

function renderList(){
  var list=currentFilter==='all'?allEmails:currentFilter==='spam'?allEmails.filter(function(e){return e.prediction===1}):allEmails.filter(function(e){return e.prediction===0});
  document.getElementById('inbox-count').textContent=list.length+' EMAILS';
  if(!list.length){document.getElementById('email-list').innerHTML='<div class="state-msg">📭 NO EMAILS FOUND.</div>';return}
  document.getElementById('email-list').innerHTML=list.map(function(em,i){
    var idx=allEmails.indexOf(em);
    var cls=em.prediction===1?'is-spam':em.prediction===0?'is-ham':'';
    var bCls=em.prediction===1?'badge-spam':em.prediction===0?'badge-ham':'badge-pending';
    var bTxt=em.prediction===1?'SPAM':em.prediction===0?'CLEAN':'—';
    return '<div class="erow '+cls+'" id="row-'+idx+'" onclick="selectEmail('+idx+')" style="animation-delay:'+i*.022+'s"><div class="erow-bar"></div><div class="erow-body"><div class="erow-top"><div class="erow-from">'+esc(em.from||'Unknown')+'</div><div class="erow-date">'+fmtDate(em.date)+'</div></div><div class="erow-subject">'+esc(em.subject||'(no subject)')+'</div><div class="erow-snippet">'+esc((em.snippet||'').slice(0,100))+'</div></div><div class="erow-badge-col"><span class="badge '+bCls+'" id="badge-'+idx+'">'+bTxt+'</span></div></div>';
  }).join('');
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');renderList();
}

async function selectEmail(idx){
  document.querySelectorAll('.erow').forEach(function(r){r.classList.remove('selected')});
  var row=document.getElementById('row-'+idx);if(row)row.classList.add('selected');
  var em=allEmails[idx];
  if(em.prediction!==undefined){showDetail(em);return}
  setBadge(idx,'badge-scanning','…');
  if(row)row.classList.add('scanning');
  try{
    var res=await fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw:em.raw})});
    var pred=await res.json();
    if(pred.error)throw new Error(pred.error);
    Object.assign(allEmails[idx],pred);applyResult(idx,pred);showDetail(allEmails[idx]);
  }catch(e){
    setBadge(idx,'badge-pending','?');if(row)row.classList.remove('scanning');
  }
}

async function scanAll(){
  var btn=document.getElementById('btn-scan'),ico=document.getElementById('scan-ico'),txt=document.getElementById('scan-txt');
  btn.disabled=true;ico.textContent='⏳';txt.textContent='SCANNING…';
  try{
    var res=await fetch('/api/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emails:allEmails})});
    var data=await res.json();
    if(data.error)throw new Error(data.error);
    data.results.forEach(function(r,i){Object.assign(allEmails[i],r);applyResult(i,r)});
    updateStats(data);renderList();
  }catch(e){alert('Scan failed: '+e.message);}
  finally{btn.disabled=false;ico.textContent='⚡';txt.textContent='SCAN INBOX'}
}

function applyResult(idx,pred){
  var row=document.getElementById('row-'+idx);if(!row)return;
  row.classList.remove('scanning','is-spam','is-ham');
  if(pred.prediction===1){row.classList.add('is-spam');setBadge(idx,'badge-spam','SPAM')}
  else if(pred.prediction===0){row.classList.add('is-ham');setBadge(idx,'badge-ham','CLEAN')}
}
function setBadge(idx,cls,txt){var b=document.getElementById('badge-'+idx);if(!b)return;b.className='badge '+cls;b.textContent=txt}

function showDetail(em){
  var panel=document.getElementById('detail'),body=document.getElementById('detail-body');
  panel.classList.remove('hidden');
  var isSpam=em.prediction===1,cls=isSpam?'spam':'ham';
  var prob=((em.probability||0)*100).toFixed(1);
  body.innerHTML=
    '<div class="result-hero '+cls+'">'+
      '<span class="hero-icon">'+(isSpam?'🚫':'✅')+'</span>'+
      '<div class="hero-verdict '+cls+'">'+(isSpam?'SPAM DETECTED':'LEGITIMATE')+'</div>'+
      '<div class="hero-conf">CONFIDENCE · '+prob+'%</div>'+
    '</div>'+
    '<div class="prob-wrap">'+
      '<div class="prob-labels">'+
        '<span class="prob-lbl">Spam Probability</span>'+
        '<span class="prob-val">'+prob+'%</span>'+
      '</div>'+
      '<div class="prob-track"><div class="prob-fill '+cls+'" style="width:'+prob+'%"></div></div>'+
    '</div>'+
    '<div class="meta-block">'+
      '<div class="meta-row"><div class="meta-key">From</div><div class="meta-val">'+esc(em.from||'—')+'</div></div>'+
      '<div class="meta-row"><div class="meta-key">Subject</div><div class="meta-val">'+esc(em.subject||'—')+'</div></div>'+
      '<div class="meta-row"><div class="meta-key">Date</div><div class="meta-val">'+esc(em.date||'—')+'</div></div>'+
    '</div>'+
    '<div class="meta-block">'+
      '<div class="feature-row"><span>HTML Content</span><span class="f-det '+(isSpam?'f-red':'f-green')+'">'+(isSpam?'DETECTED':'NONE')+'</span></div>'+
      '<div class="feature-row"><span>Uppercase Ratio</span><span class="f-det '+(isSpam?'f-gold':'f-green')+'">'+(isSpam?'HIGH':'NORMAL')+'</span></div>'+
      '<div class="feature-row"><span>URL Count</span><span class="f-det '+(isSpam?'f-red':'f-green')+'">'+(isSpam?'ELEVATED':'OK')+'</span></div>'+
      '<div class="feature-row"><span>Sender Trust</span><span class="f-det '+(isSpam?'f-red':'f-green')+'">'+(isSpam?'LOW':'VERIFIED')+'</span></div>'+
    '</div>'+
    '<div class="snippet-block">'+
      '<div class="snippet-label">Preview</div>'+
      '<div class="snippet-text">'+esc((em.snippet||'').slice(0,350))+'</div>'+
    '</div>';
}

function closeDetail(){
  document.getElementById('detail').classList.add('hidden');
  document.querySelectorAll('.erow').forEach(function(r){r.classList.remove('selected')});
}

function updateStats(data){
  var total=allEmails.length;
  var spam=data?data.spam_count:allEmails.filter(function(e){return e.prediction===1}).length;
  var ham=data?data.ham_count:allEmails.filter(function(e){return e.prediction===0}).length;
  var pct=total?Math.round((spam/total)*100):0;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-spam').textContent=spam;
  document.getElementById('s-clean').textContent=ham;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('inbox-count').textContent=total+' EMAILS';
  document.getElementById('ring-fill').style.strokeDashoffset=157*(1-pct/100);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){if(!d)return '';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}catch(e){return String(d).slice(0,10)}}
</script>
</body>
</html>
