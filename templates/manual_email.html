<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse Email — Deep Shield Mail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07070a;
  --surface:  #0f0f16;
  --surface2: #13131d;
  --border:   rgba(200,168,75,0.15);
  --border2:  rgba(255,255,255,0.06);
  --gold:     #c8a84b;
  --gold2:    #e8c96a;
  --gold-bg:  rgba(200,168,75,0.08);
  --gold-bd:  rgba(200,168,75,0.22);
  --red:      #e07060;
  --red-bg:   rgba(224,112,96,0.08);
  --red-bd:   rgba(224,112,96,0.22);
  --green:    #4ecb85;
  --green-bg: rgba(78,203,133,0.08);
  --green-bd: rgba(78,203,133,0.22);
  --ink:      #ede9e0;
  --ink2:     #9a9080;
  --ink3:     #5a5448;
  --glass:    rgba(10,10,16,0.85);
  --font:     'Outfit', sans-serif;
  --display:  'Cormorant Garamond', serif;
  --mono:     'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  height: 100%;
}

body {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: 100vh;
  position: relative;
}

/* ════════════════════════════════
   GLOBAL BACKGROUND EFFECTS
════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(200,168,75,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,168,75,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

/* Tunnel rings — continuous zoom */
.tunnel {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}

.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(200,168,75,0.12);
  width: 80px; height: 80px;
  animation: zoomRing 7s cubic-bezier(0.4,0,0.6,1) infinite;
}

.ring:nth-child(1) { animation-delay: 0s; }
.ring:nth-child(2) { animation-delay: -0.875s; }
.ring:nth-child(3) { animation-delay: -1.75s; }
.ring:nth-child(4) { animation-delay: -2.625s; }
.ring:nth-child(5) { animation-delay: -3.5s; }
.ring:nth-child(6) { animation-delay: -4.375s; }
.ring:nth-child(7) { animation-delay: -5.25s; }
.ring:nth-child(8) { animation-delay: -6.125s; }

@keyframes zoomRing {
  0%   { transform: scale(0.05); opacity: 0; border-color: rgba(200,168,75,0.45); }
  10%  { opacity: 1; }
  75%  { border-color: rgba(200,168,75,0.06); }
  100% { transform: scale(24); opacity: 0; }
}

/* Radial vignette */
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 55% 55% at 50% 50%, transparent 0%, rgba(7,7,10,0.6) 50%, rgba(7,7,10,0.97) 100%);
  pointer-events: none; z-index: 0;
}

/* Glow origin — placed near left panel center */
.glow-origin {
  position: fixed;
  left: 170px; top: 50%;
  transform: translateY(-50%);
  width: 480px; height: 480px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(200,168,75,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
  animation: glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.7; transform: translateY(-50%) scale(1); }
  50%      { opacity: 1;   transform: translateY(-50%) scale(1.12); }
}

/* ════════════════════════════════
   LEFT SIDEBAR
════════════════════════════════ */
.left {
  position: relative; z-index: 1;
  background: rgba(9,9,13,0.92);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 2.4rem 2rem;
  min-height: 100vh;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
}

/* dot texture */
.left::before {
  content: '';
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(200,168,75,0.07) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events: none;
}

/* bottom arc */
.left::after {
  content: '';
  position: absolute;
  bottom: -130px; right: -130px;
  width: 360px; height: 360px;
  border-radius: 50%;
  border: 1px solid rgba(200,168,75,0.08);
  pointer-events: none;
}

.left-inner {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100%;
}

/* ── Brand ── */
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 2.8rem;
}

.brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.brand-icon svg { width: 18px; height: 18px; }

.brand-name {
  font-family: var(--display);
  font-size: 1rem; font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.04em;
}

/* ── Heading ── */
.left-heading {
  font-family: var(--display);
  font-size: 2rem; font-weight: 300;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: 0.01em;
  margin-bottom: 1rem;
}

.left-heading em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 400;
}

.left-sub {
  font-size: 0.82rem; font-weight: 300;
  color: var(--ink3);
  line-height: 1.75;
  margin-bottom: 2.4rem;
}

/* ── Demo label ── */
.demo-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--ink3);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}

.demo-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ── Demo chips ── */
.chips {
  display: flex; flex-direction: column; gap: 5px;
  margin-bottom: 2.4rem;
}

.chip {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 11px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all 0.18s;
  font-family: var(--font);
  position: relative; overflow: hidden;
}

.chip::after {
  content: '';
  position: absolute; inset: 0; left: -100%;
  background: linear-gradient(90deg, transparent, rgba(200,168,75,0.04), transparent);
  transition: left 0.4s;
}

.chip:hover {
  background: rgba(200,168,75,0.05);
  border-color: var(--gold-bd);
  transform: translateX(4px);
}
.chip:hover::after { left: 100%; }

.chip-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.chip-dot.spam { background: var(--red); box-shadow: 0 0 5px rgba(224,112,96,0.4); }
.chip-dot.ham  { background: var(--green); box-shadow: 0 0 5px rgba(78,203,133,0.4); }
.chip-dot.news { background: var(--gold);  box-shadow: 0 0 5px rgba(200,168,75,0.4); }

.chip-text {
  font-size: 0.78rem; font-weight: 400;
  color: var(--ink2); flex: 1;
}

.chip-tag {
  font-family: var(--mono);
  font-size: 0.54rem;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  padding: 2px 7px; border-radius: 4px;
}
.chip-tag.spam { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.chip-tag.ham  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.chip-tag.news { background: var(--gold-bg);  color: var(--gold);  border: 1px solid var(--gold-bd); }

/* ── Back link ── */
.back-link {
  margin-top: auto;
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono);
  font-size: 0.63rem; font-weight: 300;
  color: var(--ink3);
  text-decoration: none;
  letter-spacing: 0.06em;
  transition: color 0.2s, gap 0.2s;
}
.back-link:hover { color: var(--gold); gap: 10px; }

/* ════════════════════════════════
   RIGHT — ANALYSIS PANEL
════════════════════════════════ */
.right {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  padding: 2.4rem 2.8rem 2rem;
  overflow-y: auto;
}

/* ── Top bar ── */
.right-top {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border2);
}

.right-top h2 {
  font-family: var(--display);
  font-size: 1.6rem; font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.02em;
}

.right-top h2 span {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.char-counter {
  font-family: var(--mono);
  font-size: 0.62rem; font-weight: 300;
  color: var(--ink3);
  background: var(--surface2);
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  letter-spacing: 0.04em;
  transition: color 0.2s, border-color 0.2s;
}
.char-counter.active {
  color: var(--gold);
  border-color: var(--gold-bd);
}

/* ── Textarea card ── */
.ta-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1.2rem 1.3rem;
  margin-bottom: 1.1rem;
  flex-shrink: 0;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.ta-card.focused {
  border-color: var(--gold-bd);
  box-shadow: 0 0 0 1px var(--gold-bd), 0 8px 32px rgba(200,168,75,0.05);
}

/* top highlight */
.ta-card::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,168,75,0.2), transparent);
  border-radius: 1px;
}

.ta-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  text-transform: uppercase; letter-spacing: 0.14em;
  color: var(--ink3);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.ta-label::after {
  content: ''; flex: 1; height: 1px;
  background: var(--border2);
}

textarea {
  width: 100%; min-height: 260px;
  background: transparent;
  border: none; outline: none;
  padding: 0.2rem 0;
  font-family: var(--mono);
  font-size: 0.74rem; font-weight: 300;
  color: var(--ink);
  line-height: 1.8;
  resize: vertical;
  caret-color: var(--gold);
}

textarea::placeholder {
  color: var(--ink3);
  font-style: italic;
}

/* ── Actions ── */
.actions {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 1.6rem;
}

.btn-analyse {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 11px 28px;
  background: linear-gradient(135deg, rgba(200,168,75,0.18) 0%, rgba(200,168,75,0.1) 100%);
  border: 1px solid rgba(200,168,75,0.4);
  border-radius: 10px;
  color: var(--ink);
  font-family: var(--font);
  font-size: 0.88rem; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
  box-shadow: 0 0 0 0 rgba(200,168,75,0);
  position: relative; overflow: hidden;
}
.btn-analyse::after {
  content: '';
  position: absolute; inset: 0; left: -100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  transition: left 0.35s;
}
.btn-analyse:hover {
  background: linear-gradient(135deg, rgba(200,168,75,0.28) 0%, rgba(200,168,75,0.16) 100%);
  border-color: rgba(200,168,75,0.65);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(200,168,75,0.15);
}
.btn-analyse:hover::after { left: 100%; }
.btn-analyse:active { transform: translateY(0) scale(0.99); }
.btn-analyse:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-clear {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 18px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--ink3);
  font-family: var(--font);
  font-size: 0.84rem;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-clear:hover {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.12);
  color: var(--ink);
}

/* spinner */
.spin {
  width: 14px; height: 14px;
  border: 1.5px solid rgba(200,168,75,0.25);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: rot 0.7s linear infinite;
  display: none;
}
@keyframes rot { to { transform: rotate(360deg); } }

/* ── Result card ── */
.result-card {
  border-radius: 14px;
  padding: 1.5rem 1.6rem;
  display: none;
  animation: fadeUp 0.32s cubic-bezier(.4,0,.2,1);
  border: 1px solid transparent;
  backdrop-filter: blur(8px);
  position: relative; overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%; height: 1px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  opacity: 0.3;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-card.spam {
  display: block;
  background: var(--red-bg);
  border-color: var(--red-bd);
  box-shadow: 0 8px 40px rgba(224,112,96,0.06);
}
.result-card.spam::before { color: var(--red); }

.result-card.ham {
  display: block;
  background: var(--green-bg);
  border-color: var(--green-bd);
  box-shadow: 0 8px 40px rgba(78,203,133,0.06);
}
.result-card.ham::before { color: var(--green); }

/* result top */
.result-top {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 1.1rem;
}

.result-icon-wrap {
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.result-card.spam .result-icon-wrap {
  background: rgba(224,112,96,0.12);
  border: 1px solid rgba(224,112,96,0.2);
}
.result-card.ham .result-icon-wrap {
  background: rgba(78,203,133,0.12);
  border: 1px solid rgba(78,203,133,0.2);
}

.result-verdict {
  font-family: var(--display);
  font-size: 1.3rem; font-weight: 400;
  letter-spacing: 0.02em;
  margin-bottom: 3px;
}
.result-card.spam .result-verdict { color: var(--red); }
.result-card.ham  .result-verdict { color: var(--green); }

.result-conf {
  font-family: var(--mono);
  font-size: 0.62rem; font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.06em;
}

/* prob bar */
.prob-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1.1rem;
}

.prob-track {
  flex: 1; height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px; overflow: hidden;
}

.prob-fill {
  height: 100%; border-radius: 2px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}
.result-card.spam .prob-fill { background: var(--red); box-shadow: 0 0 8px var(--red); }
.result-card.ham  .prob-fill { background: var(--green); box-shadow: 0 0 8px var(--green); }

.prob-label {
  font-family: var(--mono);
  font-size: 0.62rem; font-weight: 300;
  color: var(--ink3); white-space: nowrap;
  letter-spacing: 0.04em;
}

.result-tip {
  font-size: 0.8rem; font-weight: 300;
  color: var(--ink2);
  line-height: 1.65;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 0.9rem;
}
</style>
</head>
<body>

<!-- Background effects -->
<div class="tunnel">
  <div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div>
  <div class="ring"></div><div class="ring"></div>
</div>
<div class="glow-origin"></div>
<div class="vignette"></div>

<!-- ══ LEFT ══ -->
<div class="left">
  <div class="left-inner">

    <div class="brand">

      </div>

    <h1 class="left-heading">
      Paste any<br>email.<br>
      <em>We'll judge it.</em>

    <p class="left-sub">No login required. Paste a raw email — headers optional — and our ML model classifies it instantly.</p>

    <div class="demo-label">Try a demo</div>

        <div class="chip-dot spam"></div>

      <button class="chip" onclick="loadDemo('spam2')">
        <div class="chip-dot spam"></div>

      </button>
      <button class="chip" onclick="loadDemo('spam3')">
        <div class="chip-dot spam"></div>
        <div class="chip-text">Weight loss offer</div>
        <span class="chip-tag spam">Spam</span>
      </button>
      <button class="chip" onclick="loadDemo('ham1')">
        <div class="chip-dot ham"></div>
        <div class="chip-text">Team meeting invite</div>

      </button>
      <button class="chip" onclick="loadDemo('ham2')">
        <div class="chip-dot ham"></div>
        <div class="chip-text">GitHub pull request</div>
        <span class="chip-tag ham">Legit</span>
      </button>
      <button class="chip" onclick="loadDemo('nl')">
        <div class="chip-dot news"></div>
        <div class="chip-text">Morning newsletter</div>
        <span class="chip-tag news">News</span>
      </button>
    </div>

    <a href="/" class="back-link">← Back to home</a>

  </div>
</div>

<!-- ══ RIGHT ══ -->
<div class="right">

  <div class="right-top">
    <h2>Analyse <span>Email</span></h2>
    <span class="char-counter" id="cc">0 chars</span>
  </div>

  <div class="ta-card" id="ta-card">
    <div class="ta-label">Raw email input</div>
    <textarea
      id="ta"
      placeholder="Paste the full email here — headers optional…"
      oninput="onInput()"
      onfocus="document.getElementById('ta-card').classList.add('focused')"
      onblur="document.getElementById('ta-card').classList.remove('focused')"
    ></textarea>
  </div>

  <div class="actions">
    <button class="btn-analyse" id="abtn" onclick="analyse()">
      <span id="abtn-ico">→</span>
      <span id="abtn-txt">Analyse</span>
      <div class="spin" id="spin"></div>
    </button>
    <button class="btn-clear" onclick="clearAll()">✕ Clear</button>
  </div>

  <div class="result-card" id="result" role="alert" aria-live="polite">
    <div class="result-top">
      <div class="result-icon-wrap" id="r-icon"></div>
      <div>
        <div class="result-verdict" id="r-verdict"></div>
        <div class="result-conf"    id="r-conf"></div>
      </div>
    </div>
    <div class="prob-row">
      <span class="prob-label">Spam probability</span>
      <div class="prob-track"><div class="prob-fill" id="r-bar" style="width:0%"></div></div>
      <span class="prob-label" id="r-pct"></span>
    </div>
    <div class="result-tip" id="r-tip"></div>
  </div>

</div>

<script>
const demos = {
  spam1:`From: agent.james@lucky-intl-lottery.com

function loadDemo(k) {
  document.getElementById('ta').value = demos[k];
  onInput();
  document.getElementById('result').className = 'result-card';
}

function onInput() {
  const n   = document.getElementById('ta').value.length;
  const cc  = document.getElementById('cc');
  cc.textContent = n.toLocaleString() + ' chars';
  cc.classList.toggle('active', n > 0);
}

function clearAll() {
  document.getElementById('ta').value = '';
  onInput();
  document.getElementById('result').className = 'result-card';
}

async function analyse() {
  const raw = document.getElementById('ta').value.trim();
  if (!raw) { document.getElementById('ta').focus(); return; }

  const btn  = document.getElementById('abtn');
  const spin = document.getElementById('spin');
  const ico  = document.getElementById('abtn-ico');
  const txt  = document.getElementById('abtn-txt');

  btn.disabled = true;
  spin.style.display = 'block';
  ico.style.display  = 'none';
  txt.textContent    = 'Analysing…';

  try {
    const res  = await fetch('/api/predict/manual', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ raw }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const isSpam = data.prediction === 1;
    const prob   = ((data.probability || 0) * 100).toFixed(1);
    const cls    = isSpam ? 'spam' : 'ham';

    document.getElementById('result').className     = 'result-card ' + cls;
    document.getElementById('r-icon').textContent   = isSpam ? '✕' : '✓';
    document.getElementById('r-verdict').textContent = data.label || (isSpam ? 'Spam Detected' : 'Looks Legitimate');
    document.getElementById('r-conf').textContent   = 'Confidence · ' + prob + '%';
    document.getElementById('r-pct').textContent    = prob + '%';

    setTimeout(() => { document.getElementById('r-bar').style.width = prob + '%'; }, 60);

    document.getElementById('r-tip').textContent = isSpam
      ? 'This email shows patterns commonly associated with spam or phishing. Do not click any links or share personal information.'
      : 'No strong spam signals detected. This email appears legitimate, but always exercise caution with unexpected messages.';

  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled       = false;
    spin.style.display = 'none';
    ico.style.display  = 'inline';
    txt.textContent    = 'Analyse';
  }
}
</script>
</body>
