<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Shield Mail · Scan Email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #c9a84c;
  --gold-light: #f0d080;
  --gold-dim:   rgba(201,168,76,0.13);
  --gold-glow:  rgba(201,168,76,0.3);
  --bg:         #04040a;
  --ink:        #f2efe8;
  --ink2:       #9a9488;
  --ink3:       #4a4840;
  --glass:      rgba(8,8,16,0.78);
  --border:     rgba(201,168,76,0.2);
  --red:        #e05050;
  --green:      #4ecb71;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100%; background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: var(--ink); }

canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
.noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px; }

.page {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 2.5rem 1.5rem 4rem;
}

/* ── Top nav ── */
.topbar {
  width: 100%; max-width: 760px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2.8rem;
  opacity: 0; animation: fadeDown 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}

.nav-shield {
  width: 30px; height: 34px;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.35));
}

.nav-name {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 400;
  color: var(--ink); letter-spacing: 0.04em;
}
.nav-name b {
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-back {
  display: flex; align-items: center; gap: 7px;
  text-decoration: none;
  font-family: 'Space Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.12em;
  color: var(--ink3); text-transform: uppercase;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--gold); }
.nav-back::before { content: '←'; font-size: 0.9rem; }

/* ── Page heading ── */
.page-head {
  text-align: center;
  margin-bottom: 2.2rem;
  opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}

.page-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.28em;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 0.7rem;
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 700; line-height: 1.1;
  color: var(--ink);
}

.page-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── Main card ── */
.main-card {
  width: 100%; max-width: 760px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.4rem 2.4rem 2rem;
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  box-shadow: 0 40px 100px rgba(0,0,0,0.65), 0 0 80px rgba(201,168,76,0.04);
  position: relative; overflow: hidden;
  opacity: 0; animation: fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.35s forwards;
}

.main-card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.55), transparent);
}
.main-card::after {
  content: '';
  position: absolute; top: 16px; right: 16px;
  width: 28px; height: 28px;
  border-top: 1px solid var(--border); border-right: 1px solid var(--border);
  border-radius: 0 8px 0 0; opacity: 0.5;
}

.corner-bl {
  position: absolute; bottom: 16px; left: 16px;
  width: 28px; height: 28px;
  border-bottom: 1px solid var(--border); border-left: 1px solid var(--border);
  border-radius: 0 0 0 8px; opacity: 0.5;
}

/* ── Textarea ── */
.field-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.2em;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 0.8rem;
  display: flex; align-items: center; gap: 8px;
}
.field-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.email-textarea {
  width: 100%; height: 240px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 1.1rem 1.2rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem; line-height: 1.7;
  color: var(--ink2);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.email-textarea::placeholder { color: var(--ink3); }
.email-textarea:focus {
  border-color: rgba(201,168,76,0.3);
  background: rgba(0,0,0,0.5);
  color: var(--ink);
}

/* ── Scan button ── */
.scan-btn {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  width: 100%; padding: 1.1rem;
  margin-top: 1.1rem;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.42);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 0.92rem; font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 4px 24px rgba(201,168,76,0.1), inset 0 1px 0 rgba(201,168,76,0.2);
  position: relative; overflow: hidden;
}
.scan-btn::before {
  content: ''; position: absolute;
  top: 0; left: -120%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  transition: left 0.5s;
}
.scan-btn:hover::before { left: 160%; }
.scan-btn:hover {
  background: linear-gradient(135deg, rgba(201,168,76,0.26), rgba(201,168,76,0.14));
  border-color: rgba(201,168,76,0.65);
  transform: translateY(-2px);
  box-shadow: 0 8px 36px rgba(201,168,76,0.2), inset 0 1px 0 rgba(201,168,76,0.25);
}
.scan-btn:active { transform: scale(0.99); }
.scan-btn:disabled { opacity: 0.5; pointer-events: none; }

.scan-btn .spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(201,168,76,0.3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.scan-btn.loading .spinner { display: block; }
.scan-btn.loading .btn-text-label { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Result panel ── */
.result-panel {
  margin-top: 1.6rem;
  display: none;
}
.result-panel.visible { display: block; }

.result-divider {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 1.4rem;
}
.result-divider span {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.18em;
  color: var(--ink3); text-transform: uppercase; flex-shrink: 0;
}
.result-divider::before, .result-divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
}

.result-box {
  border-radius: 16px;
  padding: 1.6rem;
  border: 1px solid;
  position: relative; overflow: hidden;
  animation: resultIn 0.5s cubic-bezier(0.22,1,0.36,1);
}

@keyframes resultIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-box.spam {
  background: rgba(224,80,80,0.07);
  border-color: rgba(224,80,80,0.3);
}
.result-box.ham {
  background: rgba(78,203,113,0.07);
  border-color: rgba(78,203,113,0.3);
}

.result-box::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
}
.result-box.spam::before { background: linear-gradient(90deg, transparent, rgba(224,80,80,0.5), transparent); }
.result-box.ham::before  { background: linear-gradient(90deg, transparent, rgba(78,203,113,0.5), transparent); }

.result-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 1.2rem;
}

.result-verdict-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.spam .result-verdict-icon { background: rgba(224,80,80,0.15); border: 1px solid rgba(224,80,80,0.3); }
.ham  .result-verdict-icon { background: rgba(78,203,113,0.15); border: 1px solid rgba(78,203,113,0.3); }

.result-verdict-text {}
.result-verdict-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem; letter-spacing: 0.2em;
  text-transform: uppercase; margin-bottom: 3px;
}
.spam .result-verdict-label { color: rgba(224,80,80,0.7); }
.ham  .result-verdict-label { color: rgba(78,203,113,0.7); }

.result-verdict-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 700;
}
.spam .result-verdict-title { color: var(--red); }
.ham  .result-verdict-title { color: var(--green); }

/* ── Probability bar ── */
.prob-row {
  margin-bottom: 1rem;
}
.prob-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.prob-label span {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.1em; color: var(--ink3);
}
.prob-label strong {
  font-size: 0.75rem; font-weight: 700;
}
.spam .prob-label strong { color: var(--red); }
.ham  .prob-label strong { color: var(--green); }

.prob-track {
  height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}
.prob-fill {
  height: 100%; border-radius: 3px;
  transition: width 1s cubic-bezier(0.22,1,0.36,1);
}
.spam .prob-fill { background: linear-gradient(90deg, rgba(224,80,80,0.5), var(--red)); }
.ham  .prob-fill { background: linear-gradient(90deg, rgba(78,203,113,0.5), var(--green)); }

/* ── Meta chips ── */
.meta-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
}
.chip {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 6px;
  border: 1px solid; text-transform: uppercase;
}
.spam .chip { background: rgba(224,80,80,0.08); border-color: rgba(224,80,80,0.2); color: rgba(224,80,80,0.8); }
.ham  .chip { background: rgba(78,203,113,0.08); border-color: rgba(78,203,113,0.2); color: rgba(78,203,113,0.8); }

/* ── Error ── */
.error-box {
  display: none; margin-top: 1rem;
  padding: 0.8rem 1rem;
  border-radius: 10px;
  background: rgba(224,80,80,0.08);
  border: 1px solid rgba(224,80,80,0.25);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; color: var(--red);
}
.error-box.visible { display: block; }

/* ── Bottom bar ── */
.bottom-strip {
  width: 100%; max-width: 760px;
  margin-top: 1.8rem;
  display: flex; align-items: center; justify-content: space-between;
  opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
}
.strip-text {
  font-family: 'Space Mono', monospace;
  font-size: 0.56rem; letter-spacing: 0.12em; color: var(--ink3);
}
.dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 7px rgba(78,203,113,0.5);
  animation: blink 2.5s ease-in-out infinite;
  display: inline-block; margin-right: 6px; vertical-align: middle;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
</style>
</head>
<body>

<div class="noise"></div>
<canvas id="bg"></canvas>

<div class="page">

  <!-- Topbar -->
  <nav class="topbar">
    <a href="/" class="nav-logo">
      <svg class="nav-shield" viewBox="0 0 30 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ng" x1="0" y1="0" x2="30" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%"  stop-color="#f0d080"/>
            <stop offset="100%" stop-color="#9a7030"/>
          </linearGradient>
          <linearGradient id="ng2" x1="0" y1="0" x2="30" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f0d080" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.04"/>
          </linearGradient>
        </defs>
        <path d="M15 1L2 6.5V19C2 27 8 32 15 34C22 32 28 27 28 19V6.5L15 1Z" fill="url(#ng2)" stroke="url(#ng)" stroke-width="1"/>
        <rect x="8" y="12" width="14" height="10" rx="1.5" fill="none" stroke="url(#ng)" stroke-width="1"/>
        <path d="M8 13.5L15 19L22 13.5" stroke="url(#ng)" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span class="nav-name">Deep <b>Shield</b></span>
    </a>
    <a href="/" class="nav-back">Back to login</a>
  </nav>

  <!-- Heading -->
  <div class="page-head">
    <div class="page-eyebrow">Manual Scan</div>
    <h1 class="page-title">Paste your email,<br>get the <em>verdict</em></h1>
  </div>

  <!-- Main card -->
  <div class="main-card">
    <div class="corner-bl"></div>

    <div class="field-label">Email Content</div>
    <textarea
      class="email-textarea"
      id="emailInput"
      placeholder="Paste full email here — headers, subject, body...&#10;&#10;From: sender@example.com&#10;Subject: You've won!&#10;&#10;Congratulations! Click here to claim..."
    ></textarea>

    <button class="scan-btn" id="scanBtn" onclick="scanEmail()">
      <div class="spinner"></div>
      <span class="btn-text-label">⚡ Analyse Email</span>
    </button>

    <div class="error-box" id="errorBox"></div>

    <!-- Result -->
    <div class="result-panel" id="resultPanel">
      <div class="result-divider"><span>Analysis Result</span></div>
      <div class="result-box" id="resultBox">
        <div class="result-header">
          <div class="result-verdict-icon" id="verdictIcon"></div>
          <div class="result-verdict-text">
            <div class="result-verdict-label" id="verdictLabel"></div>
            <div class="result-verdict-title" id="verdictTitle"></div>
          </div>
        </div>
        <div class="prob-row">
          <div class="prob-label">
            <span>Confidence Score</span>
            <strong id="probText">0%</strong>
          </div>
          <div class="prob-track">
            <div class="prob-fill" id="probFill" style="width:0%"></div>
          </div>
        </div>
        <div class="meta-chips" id="metaChips"></div>
      </div>
    </div>

  </div>

  <!-- Bottom strip -->
  <div class="bottom-strip">
    <span class="strip-text"><span class="dot-live"></span>Model active · No data stored</span>
    <span class="strip-text">Deep Shield Mail · v2.0</span>
  </div>

</div>

<script>
async function scanEmail() {
  const input  = document.getElementById('emailInput');
  const btn    = document.getElementById('scanBtn');
  const errBox = document.getElementById('errorBox');
  const panel  = document.getElementById('resultPanel');
  const raw    = input.value.trim();

  errBox.classList.remove('visible');
  panel.classList.remove('visible');

  if (!raw) {
    errBox.textContent = 'Please paste an email first.';
    errBox.classList.add('visible');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res  = await fetch('/api/predict/manual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw }),
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const isSpam = data.prediction === 1;
    const prob   = Math.round((data.probability || 0) * 100);
    const box    = document.getElementById('resultBox');

    box.className      = 'result-box ' + (isSpam ? 'spam' : 'ham');
    document.getElementById('verdictIcon').textContent  = isSpam ? '🚨' : '✅';
    document.getElementById('verdictLabel').textContent = isSpam ? 'Threat Detected' : 'Clean Email';
    document.getElementById('verdictTitle').textContent = isSpam ? 'SPAM' : 'HAM';
    document.getElementById('probText').textContent     = prob + '%';

    setTimeout(() => {
      document.getElementById('probFill').style.width = prob + '%';
    }, 100);

    const chips = [
      `Confidence: ${prob}%`,
      isSpam ? 'Flagged' : 'Cleared',
      data.label || (isSpam ? 'Spam' : 'Ham'),
    ];
    document.getElementById('metaChips').innerHTML =
      chips.map(c => `<span class="chip">${c}</span>`).join('');

    panel.classList.add('visible');
  } catch (err) {
    errBox.textContent = '⚠ ' + (err.message || 'Prediction failed. Try again.');
    errBox.classList.add('visible');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

/* allow Ctrl+Enter to submit */
document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) scanEmail();
});

/* ══ Particle background (same as index) ══ */
(function() {
  const canvas = document.getElementById('bg');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  const GOLD = [201,168,76], WHITE = [255,255,255];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function rand(a,b) { return a + Math.random()*(b-a); }

  function create() {
    const g = Math.random()<0.4;
    const [r,g2,b] = g ? GOLD : WHITE;
    return { x:rand(0,W), y:rand(0,H), vx:rand(-0.12,0.12), vy:rand(-0.08,-0.25),
             size:rand(0.5,g?1.8:1), alpha:rand(0.1,0.6), r, g:g2, b,
             flicker:rand(0.004,0.018), phase:rand(0,Math.PI*2) };
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    const gr = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.65);
    gr.addColorStop(0,'rgba(12,8,24,0.4)'); gr.addColorStop(1,'rgba(2,2,6,0.5)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    for (const p of particles) {
      p.phase += p.flicker;
      const a = p.alpha*(0.6+0.4*Math.sin(p.phase));
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${a})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-5) p.y=H+5; if(p.x<-5) p.x=W+5; if(p.x>W+5) p.x=-5;
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  particles = Array.from({length:80}, create);
  draw();
})();
</script>

</body>
</html>
